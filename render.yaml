services:
  - type: web
    name: skyward
    env: python
    buildCommand: |
      # Create X11 directory with correct permissions
      mkdir -p /tmp/.X11-unix
      chmod 1777 /tmp/.X11-unix

      # Install Chrome and dependencies
      apt-get update
      apt-get install -y wget gnupg2 xvfb fonts-liberation libasound2 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxshmfence1
      
      # Install Chrome
      wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
      apt-get install -y ./google-chrome-stable_current_amd64.deb
      rm google-chrome-stable_current_amd64.deb
      
      # Print Chrome version for debugging
      google-chrome --version
      
      # Install Python dependencies
      pip install -r requirements.txt
    startCommand: |
      # Start Xvfb with correct permissions
      Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset >/dev/null 2>&1 &
      export DISPLAY=:99
      
      # Start the application with increased timeout
      gunicorn app:app --timeout 120 --workers 1 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: CHROME_BIN
        value: /usr/bin/google-chrome
      - key: CHROME_PATH
        value: /usr/bin/google-chrome
      # Add memory limit
      - key: PYTHONMALLOC
        value: malloc
      - key: MALLOC_ARENA_MAX
        value: "2"
    autoDeploy: true